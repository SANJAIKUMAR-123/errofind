<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/E.png" type="image/x-icon">
    <title>ErroFind</title>
</head>
<body>
    <!-- NAVBAR -->
    <nav id="nav">
        <div id="logo-section">
            <img src="images/E.png" alt="Logo" height="80px" width="80px">
            <h1 id="txt">ErroFind</h1>
        </div>
        <ul id="list">
            <li><a href="#hero">About</a></li>
            <li><a href="#form-container">Translator</a></li>
            <li><a href="#foot">Contact</a></li>
        </ul>
    </nav>

    <!-- HERO SECTION -->

    <section id="hero">
        <img src="images/logo-removebg-preview.png" alt="Logo" height="200px" width="250px" id="img">
        <h1 id="text">ErroFind</h1>
        <p>
            ErroFind helps developers understand programming errors easily with
            explanations, fixes, and example programs.
        </p>
    </section>
    <!-- FORM SECTION -->
    <section id="form-container">
        <div id="form">
            <h1>Error Message Translator</h1>
            <form>
                <label>Paste your error here</label>
                <textarea
                    id="val"
                    placeholder="Enter Error Message"
                ></textarea>
                <label>Select Language</label>
                <select id="language">
                    <option value="">Choose Language</option>
                    <option value="C">C</option>
                    <option value="CPP">C++</option>
                    <option value="Java">Java</option>
                    <option value="Python">Python</option>
                    <option value="JavaScript">JavaScript</option>
                </select>
                <button type="button" onclick="validate()">
                    Explain Error
                </button>
                <div id="ans"></div>
            </form>
        </div>
    </section>
    <!-- FOOTER -->
    <footer id="foot">
        <h1>Contact</h1>
        <p>Email: sanjaikumarcse23@gmail.com</p>
        <p>Mobile: +91 7397136485</p>
        <p>&copy; Developed by Sanjai Kumar</p>
    </footer>
    <script src="errors.js"></script>
    <script src="script.js"></script>
</body>
</html>
